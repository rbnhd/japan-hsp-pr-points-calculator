name: Mirror to japan-hsp-pr-points-calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Don't persist the default GITHUB_TOKEN as an extraheader in git
          # config — otherwise it overrides the MIRROR_TOKEN we embed in the
          # push URL below and the push fails with 403 "denied to
          # github-actions[bot]".
          persist-credentials: false

      - name: Push main to mirror
        run: |
          git push --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/rbnhd/japan-hsp-pr-points-calculator.git" \
            main:main
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
