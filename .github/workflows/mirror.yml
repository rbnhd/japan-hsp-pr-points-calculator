name: Mirror to japan-hsp-pr-points-calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    # Only run on the source repo — not on the mirror that inherits this file.
    # When the mirror receives a force-push it will also trigger this workflow,
    # but the if-check below causes it to skip immediately (green, no noise).
    # This also lets us keep Actions enabled on the mirror so that GitHub's
    # own "pages build and deployment" system workflow can rebuild Pages on
    # every sync.
    if: github.repository == 'rbnhd/pr-point-calc-japan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Don't persist the default GITHUB_TOKEN as an extraheader in git
          # config — otherwise it overrides the MIRROR_TOKEN we embed in the
          # push URL below and the push fails with 403 "denied to
          # github-actions[bot]".
          persist-credentials: false

      - name: Push main to mirror
        run: |
          git push --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/rbnhd/japan-hsp-pr-points-calculator.git" \
            main:main
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
